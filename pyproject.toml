# =============================================================================
# project - pyproject.toml
# =============================================================================
# Dependency and tooling configuration for Airflow project
#
# Install:
#   uv sync --group airflow --group airflow-providers --group iceberg --group dev
#
# Or with an existing venv:
#   uv pip install --group airflow --group airflow-providers --group iceberg --group dev
# =============================================================================


# ---------------------------------------------------------------------------
# Dependencies
# ---------------------------------------------------------------------------

[dependency-groups]

default = [
    "pandas==2.3.3",
    "pydantic-settings==2.14.2",
    "pyxlsb==1.0.10",
    "openpyxl==3.1.5",
    "xlrd==2.0.2",
    "tenacity==9.1.4",
    "trino==0.338.0",
    "psycopg2-binary==2.9.12",
]

# ---- Airflow core ----------------------------------------------------------

airflow = [
    "apache-airflow==3.2.2",
    "apache-airflow-core==3.2.2",
    "apache-airflow-task-sdk==1.2.2",
]

# ---- Airflow providers -----------------------------------------------------

airflow-providers = [
    "apache-airflow-providers-amazon==9.32.0",
    "apache-airflow-providers-celery==3.22.0",
    "apache-airflow-providers-common-compat==1.16.0",
    "apache-airflow-providers-common-io==1.7.2",
    "apache-airflow-providers-common-messaging==2.0.4",
    "apache-airflow-providers-common-sql==2.0.2",
    "apache-airflow-providers-http==6.0.4",
    "apache-airflow-providers-postgres==6.8.0",
    "apache-airflow-providers-smtp==3.0.2",
    "apache-airflow-providers-standard==1.16.0",
    "apache-airflow-providers-openlineage==2.19.0",
]

# ---- Iceberg / S3 ----------------------------------------------------------

iceberg = [
    "pyiceberg[s3fs,pandas,pyarrow,sql-postgres]==0.11.1",
]

# ---- Development -----------------------------------------------------------

dev = [
    "pytest==9.1.1",
    "pre-commit==4.6.0",
]


# ---------------------------------------------------------------------------
# Black
# ---------------------------------------------------------------------------

[tool.black]

line-length = 130
target-version = ["py312"]


# ---------------------------------------------------------------------------
# Ruff
# ---------------------------------------------------------------------------

[tool.ruff]

line-length = 130
target-version = "py312"

src = [
    "project",
    "dags",
    "scripts",
    "tests",
]


[tool.ruff.lint]

select = [
    "E",
    "W",
    "F",
    "I",
    "B",
    "UP",
    "SIM",
    "TCH",
    "RUF",
]

ignore = [
    "E501",
]


[tool.ruff.lint.isort]

known-first-party = [
    "project",
]


# ---------------------------------------------------------------------------
# Pytest
# ---------------------------------------------------------------------------

[tool.pytest.ini_options]

testpaths = [
    "tests",
]

python_files = [
    "test_*.py",
    "*_test.py",
]

python_classes = [
    "Test*",
]

python_functions = [
    "test_*",
]

addopts = [
    "--strict-markers",
    "--tb=short",
]
